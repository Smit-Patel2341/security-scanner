<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Security Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 6px; color: #fff; }
    .subtitle { color: #94a3b8; margin-bottom: 30px; font-size: 15px; }
    textarea { width: 100%; height: 220px; background: #1e2130; border: 1px solid #2d3748; border-radius: 10px; padding: 16px; color: #e2e8f0; font-family: monospace; font-size: 13px; resize: vertical; outline: none; }
    textarea:focus { border-color: #6366f1; }
    button { margin-top: 14px; background: #6366f1; color: white; border: none; padding: 12px 32px; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500; }
    button:hover { background: #4f46e5; }
    button:disabled { background: #374151; cursor: not-allowed; }
    #results { margin-top: 30px; }
    .summary-box { background: #1e2130; border: 1px solid #2d3748; border-radius: 10px; padding: 18px; margin-bottom: 20px; color: #94a3b8; font-size: 14px; line-height: 1.6; }
    .vuln-card { background: #1e2130; border-radius: 10px; padding: 18px; margin-bottom: 14px; border-left: 4px solid #ccc; }
    .vuln-card.Critical { border-left-color: #ef4444; }
    .vuln-card.High { border-left-color: #f97316; }
    .vuln-card.Medium { border-left-color: #eab308; }
    .vuln-card.Low { border-left-color: #22c55e; }
    .vuln-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .vuln-name { font-weight: 600; font-size: 15px; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .badge.Critical { background: #450a0a; color: #fca5a5; }
    .badge.High { background: #431407; color: #fdba74; }
    .badge.Medium { background: #422006; color: #fde047; }
    .badge.Low { background: #052e16; color: #86efac; }
    .vuln-location { font-size: 12px; color: #64748b; margin-bottom: 8px; font-family: monospace; }
    .vuln-desc { font-size: 13px; color: #94a3b8; margin-bottom: 8px; line-height: 1.6; }
    .vuln-fix { font-size: 13px; color: #6ee7b7; line-height: 1.6; }
    .vuln-fix strong { color: #34d399; }
    .loading { text-align: center; padding: 40px; color: #6366f1; font-size: 15px; }
    .no-vuln { text-align: center; padding: 30px; color: #22c55e; font-size: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Security Scanner</h1>
    <p class="subtitle">Paste your code below and the AI will detect vulnerabilities instantly.</p>

    <textarea id="codeInput" placeholder="Paste your code here..."></textarea>
    <button id="scanBtn" onclick="scanCode()">Scan for vulnerabilities</button>

    <div id="results"></div>
  </div>

  <script>
    async function scanCode() {
      const code = document.getElementById('codeInput').value.trim();
      const resultsDiv = document.getElementById('results');
      const btn = document.getElementById('scanBtn');

      if (!code) {
        alert('Please paste some code first.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Scanning...';
      resultsDiv.innerHTML = '<div class="loading">Analyzing your code for vulnerabilities...</div>';

      try {
        const response = await fetch('/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });

        const data = await response.json();

        if (data.error) {
          resultsDiv.innerHTML = `<div class="summary-box" style="color:#ef4444">${data.error}</div>`;
          return;
        }

        let html = '';

        if (data.summary) {
          html += `<div class="summary-box">${data.summary}</div>`;
        }

        if (!data.vulnerabilities || data.vulnerabilities.length === 0) {
          html += '<div class="no-vuln">No vulnerabilities found. Code looks clean!</div>';
        } else {
          data.vulnerabilities.forEach(v => {
            html += `
              <div class="vuln-card ${v.severity}">
                <div class="vuln-header">
                  <span class="vuln-name">${v.name}</span>
                  <span class="badge ${v.severity}">${v.severity}</span>
                </div>
                <div class="vuln-location">Location: ${v.location}</div>
                <div class="vuln-desc">${v.description}</div>
                <div class="vuln-fix"><strong>Fix:</strong> ${v.fix}</div>
              </div>`;
          });
        }

        resultsDiv.innerHTML = html;

      } catch (err) {
        resultsDiv.innerHTML = '<div class="summary-box" style="color:#ef4444">Failed to connect to server. Make sure server.js is running.</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Scan for vulnerabilities';
      }
    }
  </script>
</body>
</html>
